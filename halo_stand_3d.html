<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HALO – El Despertar de los Sentidos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1208; overflow: hidden; font-family: 'Georgia', serif; }
  #canvas { display: block; width: 100vw; height: 100vh; }

  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 18px 32px;
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    pointer-events: none;
  }
  #logo {
    color: #d4a94a;
    font-size: 22px;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(212,169,74,0.6);
  }
  #tagline {
    color: #e8d5a0;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  #info-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 20px 32px;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
    display: flex; justify-content: center; gap: 40px;
    pointer-events: none;
  }
  .product-label {
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .product-label.visible { opacity: 1; }
  .product-label h3 {
    color: #d4a94a;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .product-label p {
    color: #c8b882;
    font-size: 12px;
    letter-spacing: 1px;
  }

  #hover-info {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20,14,5,0.92);
    border: 1px solid #d4a94a;
    border-radius: 12px;
    padding: 24px 36px;
    text-align: center;
    display: none;
    min-width: 220px;
    backdrop-filter: blur(10px);
  }
  #hover-info h2 { color: #d4a94a; font-size: 20px; letter-spacing: 3px; margin-bottom: 8px; text-transform: uppercase; }
  #hover-info p  { color: #d0bb8a; font-size: 13px; line-height: 1.7; letter-spacing: 0.5px; }
  #hover-info .close-btn {
    margin-top: 14px;
    display: inline-block;
    padding: 6px 20px;
    border: 1px solid #d4a94a;
    color: #d4a94a;
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    pointer-events: all;
  }

  #instructions {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%);
    color: rgba(200,184,130,0.6);
    font-size: 12px;
    letter-spacing: 2px;
    text-align: center;
    pointer-events: none;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="ui">
  <div id="logo">✦ HALO</div>
  <div id="tagline">El Despertar de los Sentidos</div>
</div>

<div id="hover-info">
  <h2 id="hi-name"></h2>
  <p id="hi-desc"></p>
  <div class="close-btn" onclick="closeInfo()">CERRAR ✕</div>
</div>

<div id="instructions">Arrastra para rotar · Scroll para acercar · Clic en los frascos para explorar</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const products = [
  { name: 'SERENIDAD',       desc: 'Aroma suave de lavanda y sándalo.\nTransquilidad en cada respiración.',   color: 0xb8a9d4, lid: 0xd4a94a, x: -4.2 },
  { name: 'CONCENTRACIÓN',   desc: 'Menta fresca y eucalipto.\nClaridad mental para tu mejor día.',           color: 0xa4c8b0, lid: 0xd4a94a, x: -2.8 },
  { name: 'ENERGÍA',         desc: 'Cítricos vibrantes y jengibre.\nDespierta tu potencial interior.',         color: 0xf0d080, lid: 0xd4a94a, x: -1.4 },
  { name: 'BUENA FORTUNA',   desc: 'Jazmín y vetiver dorado.\nAtrae la prosperidad a tu entorno.',            color: 0xe8c0a0, lid: 0xd4a94a, x:  1.4 },
  { name: 'SUEÑO PROFUNDO',  desc: 'Manzanilla y ylang-ylang.\nUna noche de descanso sublime.',              color: 0x9ab8d8, lid: 0xd4a94a, x:  2.8 },
  { name: 'SENSUAL',         desc: 'Rosa, ámbar y pachulí.\nEl aroma de la seducción refinada.',              color: 0xe8a0b8, lid: 0xd4a94a, x:  4.2 },
];

const launchProduct = {
  name: 'ESTRELLA DE LA MAÑANA',
  desc: 'Renacer · Edición Limitada\nEl aroma del nuevo amanecer.\nFlores blancas, musgo y luz dorada.',
  color: 0xf8f0e0, lid: 0xd4a94a
};

// --- Scene Setup ---
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a1208, 0.06);
scene.background = new THREE.Color(0x100b04);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3.5, 11);
camera.lookAt(0, 1.5, 0);

// --- Lighting ---
const ambient = new THREE.AmbientLight(0xfff5e0, 0.4);
scene.add(ambient);

const mainLight = new THREE.DirectionalLight(0xfff0c8, 1.8);
mainLight.position.set(5, 12, 8);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(2048, 2048);
mainLight.shadow.camera.near = 1;
mainLight.shadow.camera.far = 40;
mainLight.shadow.camera.left = -10;
mainLight.shadow.camera.right = 10;
mainLight.shadow.camera.top = 10;
mainLight.shadow.camera.bottom = -10;
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0xd0e8ff, 0.4);
fillLight.position.set(-8, 6, 4);
scene.add(fillLight);

// Gold spotlights above each jar
products.forEach((p, i) => {
  const spot = new THREE.SpotLight(0xffd080, 1.5, 8, Math.PI / 8, 0.5);
  spot.position.set(p.x, 5.5, -0.5);
  spot.target.position.set(p.x, 2, -0.5);
  scene.add(spot);
  scene.add(spot.target);
});

// Center display spotlight
const centerSpot = new THREE.SpotLight(0xffffff, 2.5, 10, Math.PI / 10, 0.4);
centerSpot.position.set(0, 7, 0);
centerSpot.target.position.set(0, 2.5, 0);
scene.add(centerSpot);
scene.add(centerSpot.target);

// Floor
const floorGeo = new THREE.PlaneGeometry(30, 30);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x3d3020, roughness: 0.8, metalness: 0.1
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Tile pattern on floor
const tileGeo = new THREE.PlaneGeometry(28, 28);
const tileMat = new THREE.MeshStandardMaterial({ color: 0x4a3a22, roughness: 0.7, metalness: 0.15 });
const tile = new THREE.Mesh(tileGeo, tileMat);
tile.rotation.x = -Math.PI / 2;
tile.position.y = 0.001;
tile.receiveShadow = true;
scene.add(tile);

// ─── STAND BACK WALL ARCH ───
function makeWood(color = 0x7a4f2a) {
  return new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.05 });
}
function makeGold() {
  return new THREE.MeshStandardMaterial({ color: 0xd4a94a, roughness: 0.3, metalness: 0.8 });
}

// Back curved wall segments
for (let i = -3; i <= 3; i++) {
  const panelW = i === 0 ? 2.2 : 1.55;
  const panelH = 5.5;
  const panelD = 0.18;
  const geo = new THREE.BoxGeometry(panelW, panelH, panelD);
  const mat = makeWood(i % 2 === 0 ? 0x7a4f2a : 0x6a4222);
  const panel = new THREE.Mesh(geo, mat);
  panel.position.set(i * 1.55, panelH / 2, -4.2 + Math.abs(i) * 0.18);
  panel.castShadow = true;
  panel.receiveShadow = true;
  scene.add(panel);
}

// Gold trim top bar
const topBarGeo = new THREE.BoxGeometry(11, 0.2, 0.25);
const topBar = new THREE.Mesh(topBarGeo, makeGold());
topBar.position.set(0, 5.6, -3.3);
topBar.castShadow = true;
scene.add(topBar);

// Header sign background
const signGeo = new THREE.BoxGeometry(10, 1.1, 0.1);
const signMat = new THREE.MeshStandardMaterial({ color: 0x2c1e0f, roughness: 0.5 });
const sign = new THREE.Mesh(signGeo, signMat);
sign.position.set(0, 6.1, -3.25);
scene.add(sign);

// Gold frame around sign
const frameParts = [
  [10.2, 0.08, 0.12, 0, 6.65, -3.22],
  [10.2, 0.08, 0.12, 0, 5.55, -3.22],
  [0.08, 1.2, 0.12, -5.1, 6.1, -3.22],
  [0.08, 1.2, 0.12, 5.1, 6.1, -3.22],
];
frameParts.forEach(([w, h, d, x, y, z]) => {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), makeGold());
  m.position.set(x, y, z);
  scene.add(m);
});

// Side walls
[-1, 1].forEach(side => {
  const wallGeo = new THREE.BoxGeometry(0.18, 5.5, 4);
  const wall = new THREE.Mesh(wallGeo, makeWood());
  wall.position.set(side * 5.5, 2.75, -2.2);
  wall.castShadow = true;
  wall.receiveShadow = true;
  scene.add(wall);
});

// Platform / stage floor
const stageGeo = new THREE.BoxGeometry(11.5, 0.2, 5);
const stageMat = new THREE.MeshStandardMaterial({ color: 0x5a3e1e, roughness: 0.6, metalness: 0.1 });
const stage = new THREE.Mesh(stageGeo, stageMat);
stage.position.set(0, 0.1, -1.8);
stage.receiveShadow = true;
scene.add(stage);

// Gold stage trim
const stageTrimGeo = new THREE.BoxGeometry(11.5, 0.06, 0.06);
const stageTrim = new THREE.Mesh(stageTrimGeo, makeGold());
stageTrim.position.set(0, 0.22, 0.3);
scene.add(stageTrim);

// ─── PRODUCT PEDESTALS ───
function makePedestal(x) {
  const group = new THREE.Group();
  // Base column
  const colGeo = new THREE.CylinderGeometry(0.28, 0.32, 1.5, 8);
  const col = new THREE.Mesh(colGeo, makeWood(0x6a3e18));
  col.position.y = 0.75;
  col.castShadow = true;
  group.add(col);
  // Gold ring top
  const ringGeo = new THREE.TorusGeometry(0.3, 0.04, 8, 24);
  const ring = new THREE.Mesh(ringGeo, makeGold());
  ring.rotation.x = Math.PI / 2;
  ring.position.y = 1.52;
  group.add(ring);
  // LED glow disc at base
  const discGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.04, 24);
  const discMat = new THREE.MeshStandardMaterial({ color: 0xfff5cc, emissive: 0xffd060, emissiveIntensity: 1.2 });
  const disc = new THREE.Mesh(discGeo, discMat);
  disc.position.y = 0.02;
  group.add(disc);

  group.position.set(x, 0.2, -0.5);
  return group;
}

const clickableMeshes = [];

products.forEach((p, i) => {
  const ped = makePedestal(p.x);
  scene.add(ped);

  // Jar
  const jarGroup = new THREE.Group();
  const jarGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.7, 32);
  const jarMat = new THREE.MeshStandardMaterial({
    color: p.color, roughness: 0.15, metalness: 0.05,
    transparent: true, opacity: 0.75
  });
  const jar = new THREE.Mesh(jarGeo, jarMat);
  jar.castShadow = true;
  jarGroup.add(jar);

  // Lid
  const lidGeo = new THREE.CylinderGeometry(0.3, 0.28, 0.14, 32);
  const lid = new THREE.Mesh(lidGeo, makeGold());
  lid.position.y = 0.42;
  lid.castShadow = true;
  jarGroup.add(lid);

  jarGroup.position.set(p.x, 1.9, -0.5);
  jarGroup.userData = { type: 'product', name: p.name, desc: p.desc };
  scene.add(jarGroup);
  clickableMeshes.push(jar);
  jar.userData = jarGroup.userData;
});

// ─── CENTRAL DISPLAY ───
const centerPedGeo = new THREE.CylinderGeometry(1.0, 1.15, 1.2, 32);
const centerPedMat = new THREE.MeshStandardMaterial({ color: 0x5a3818, roughness: 0.5, metalness: 0.1 });
const centerPed = new THREE.Mesh(centerPedGeo, centerPedMat);
centerPed.position.set(0, 0.8, -2.2);
centerPed.castShadow = true;
centerPed.receiveShadow = true;
scene.add(centerPed);

// Gold ring on center pedestal
const cRingGeo = new THREE.TorusGeometry(1.12, 0.05, 8, 64);
const cRing = new THREE.Mesh(cRingGeo, makeGold());
cRing.rotation.x = Math.PI / 2;
cRing.position.set(0, 1.42, -2.2);
scene.add(cRing);

// Glass dome
const domeGeo = new THREE.SphereGeometry(0.72, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
const domeMat = new THREE.MeshStandardMaterial({
  color: 0xd0eaff, transparent: true, opacity: 0.18,
  roughness: 0.05, metalness: 0.1, side: THREE.DoubleSide
});
const dome = new THREE.Mesh(domeGeo, domeMat);
dome.position.set(0, 1.43, -2.2);
scene.add(dome);

// Center jar (hero product)
const heroJarGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.85, 32);
const heroJarMat = new THREE.MeshStandardMaterial({
  color: 0xf8f0e0, roughness: 0.1, metalness: 0.05,
  transparent: true, opacity: 0.8
});
const heroJar = new THREE.Mesh(heroJarGeo, heroJarMat);
heroJar.position.set(0, 1.85, -2.2);
heroJar.castShadow = true;
heroJar.userData = { type: 'product', name: launchProduct.name, desc: launchProduct.desc };
scene.add(heroJar);
clickableMeshes.push(heroJar);

// Hero lid
const heroLidGeo = new THREE.CylinderGeometry(0.37, 0.35, 0.16, 32);
const heroLid = new THREE.Mesh(heroLidGeo, makeGold());
heroLid.position.set(0, 2.32, -2.2);
scene.add(heroLid);

// Ambient glow under dome
const glowLight = new THREE.PointLight(0xfff0cc, 1.5, 2.5);
glowLight.position.set(0, 1.5, -2.2);
scene.add(glowLight);

// ─── SIGNAGE PANELS ───
[-5.0, 5.0].forEach((x, i) => {
  const boardGeo = new THREE.BoxGeometry(0.8, 2, 0.08);
  const boardMat = new THREE.MeshStandardMaterial({ color: 0xe8d8b8, roughness: 0.8 });
  const board = new THREE.Mesh(boardGeo, boardMat);
  board.position.set(x, 1.5, 0.5);
  board.rotation.y = x < 0 ? 0.2 : -0.2;
  board.castShadow = true;
  scene.add(board);

  // Gold frame
  const bFrameGeo = new THREE.BoxGeometry(0.85, 2.05, 0.04);
  const bFrame = new THREE.Mesh(bFrameGeo, makeGold());
  bFrame.position.set(x, 1.5, 0.47);
  bFrame.rotation.y = x < 0 ? 0.2 : -0.2;
  scene.add(bFrame);
});

// ─── PARTICLE STEAM EFFECT ───
const particleCount = 180;
const positions = new Float32Array(particleCount * 3);
const particleData = [];
for (let i = 0; i < particleCount; i++) {
  const pid = i % products.length;
  const px = products[pid].x + (Math.random() - 0.5) * 0.2;
  positions[i * 3] = px;
  positions[i * 3 + 1] = 1.9 + Math.random() * 1.5;
  positions[i * 3 + 2] = -0.5;
  particleData.push({ ox: px, life: Math.random(), speed: 0.003 + Math.random() * 0.004 });
}
const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.035, transparent: true, opacity: 0.35 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ─── CONTROLS (Orbit-like) ───
let isDragging = false, lastX = 0, lastY = 0;
let yaw = 0, pitch = 0.18, radius = 11;
let targetYaw = 0, targetPitch = 0.18, targetRadius = 11;

canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  targetYaw   += (e.clientX - lastX) * 0.008;
  targetPitch += (e.clientY - lastY) * 0.006;
  targetPitch = Math.max(0.05, Math.min(0.55, targetPitch));
  lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener('wheel', e => {
  targetRadius += e.deltaY * 0.015;
  targetRadius = Math.max(5, Math.min(18, targetRadius));
}, { passive: true });

// Touch
let lastTX = 0, lastTY = 0;
canvas.addEventListener('touchstart', e => { lastTX = e.touches[0].clientX; lastTY = e.touches[0].clientY; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  targetYaw   += (e.touches[0].clientX - lastTX) * 0.01;
  targetPitch += (e.touches[0].clientY - lastTY) * 0.007;
  targetPitch = Math.max(0.05, Math.min(0.55, targetPitch));
  lastTX = e.touches[0].clientX; lastTY = e.touches[0].clientY;
}, { passive: false });

// ─── RAYCASTER (click) ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const hoverInfo = document.getElementById('hover-info');

canvas.addEventListener('click', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickableMeshes);
  if (hits.length > 0) {
    const d = hits[0].object.userData;
    document.getElementById('hi-name').textContent = d.name;
    document.getElementById('hi-desc').textContent = d.desc;
    hoverInfo.style.display = 'block';
  }
});

function closeInfo() { hoverInfo.style.display = 'none'; }

// ─── RESIZE ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── ANIMATE ───
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.012;

  // Smooth camera
  yaw   += (targetYaw   - yaw)   * 0.07;
  pitch += (targetPitch - pitch) * 0.07;
  radius += (targetRadius - radius) * 0.07;

  const cx = Math.sin(yaw) * radius * Math.cos(pitch);
  const cy = Math.sin(pitch) * radius + 1;
  const cz = Math.cos(yaw) * radius * Math.cos(pitch);
  camera.position.set(cx, cy, cz);
  camera.lookAt(0, 1.5, -1.5);

  // Glow pulsation
  glowLight.intensity = 1.2 + Math.sin(t * 1.8) * 0.6;

  // Hero jar float
  heroJar.position.y = 1.85 + Math.sin(t * 0.9) * 0.06;
  heroLid.position.y = 2.32 + Math.sin(t * 0.9) * 0.06;
  dome.position.y    = 1.43 + Math.sin(t * 0.9) * 0.015;

  // Steam particles
  const pos = particles.geometry.attributes.position;
  for (let i = 0; i < particleCount; i++) {
    const d = particleData[i];
    d.life += d.speed;
    if (d.life > 1) {
      d.life = 0;
      pos.setY(i, 1.9);
    } else {
      pos.setY(i, pos.getY(i) + 0.008);
    }
    pos.setX(i, d.ox + Math.sin(d.life * Math.PI * 3 + i) * 0.08);
  }
  pos.needsUpdate = true;
  particleMat.opacity = 0.28 + Math.sin(t) * 0.08;

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
